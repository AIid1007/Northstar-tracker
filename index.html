<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#FFF6EC" />
  <title>NorthStar — your guided path to any goal</title>
  <meta name="description" content="Turn any goal into tiny, expert-crafted steps. Built for people who get stuck at 'where do I start?'" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="site-header">
    <a href="#/" class="brand" aria-label="NorthStar home">
      <svg class="brand-star" viewBox="0 0 40 40" aria-hidden="true">
        <g class="star-spin">
          <path d="M20 2 L23 17 L38 20 L23 23 L20 38 L17 23 L2 20 L17 17 Z" fill="currentColor"/>
        </g>
      </svg>
      <span class="brand-name">NorthStar</span>
    </a>
    <nav class="site-nav" id="site-nav" hidden>
      <a href="#/dashboard" data-view="dashboard">Today</a>
      <a href="#/plan" data-view="plan">Plan</a>
      <a href="#/stats" data-view="stats">Stats</a>
      <button class="icon-btn" id="settings-btn" aria-label="Settings">⚙</button>
    </nav>
  </header>

  <main id="app" class="stage"></main>

  <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <dialog id="settings-dialog" class="dialog">
    <form method="dialog" class="dialog-body">
      <h2>Settings</h2>
      <label class="field">
        <span class="field-label">Anthropic API key</span>
        <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
        <small>Stored only in this browser. <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Get one →</a></small>
      </label>
      <label class="field switch">
        <input type="checkbox" id="tough-love-toggle" />
        <span>Tough-love mode <em>(blunter nudges)</em></span>
      </label>
      <label class="field">
        <span class="field-label">Focus interval (minutes)</span>
        <input type="number" id="focus-mins" min="5" max="90" value="25" />
      </label>
      <label class="field">
        <span class="field-label">Rest interval (minutes)</span>
        <input type="number" id="rest-mins" min="1" max="30" value="5" />
      </label>
      <div class="dialog-actions">
        <button type="button" class="btn ghost" id="export-btn">Export data</button>
        <button type="button" class="btn ghost danger" id="reset-btn">Reset everything</button>
        <button type="submit" value="save" class="btn primary" id="save-settings">Save</button>
      </div>
    </form>
  </dialog>

  <script src="js/storage.js"></script>
  <script src="js/nudges.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/api.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
